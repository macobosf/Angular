<!-- space-y-8: ritmo vertical entre el hero y las acciones sin flex explícito -->
<section class="space-y-8">

  <app-hero />

  <!-- Dos botones con el mismo comportamiento para comparar: clase CSS global vs utilidades Tailwind -->
  <div class="flex justify-center gap-4 py-4">

    <!-- Enfoque clásico: estilo definido en styles.css -->
    <button class="btn-primary" (click)="goToStudentsPage()">
      Ver Estudiantes →
    </button>

    <!-- Enfoque Tailwind: fill on hover con token de marca; hover:bg-brand rellena el fondo al pasar el cursor -->
    <button
      type="button"
      class="w-fit rounded-md border-2 border-brand bg-transparent px-5 py-2.5 font-medium text-brand transition-colors duration-200 hover:bg-brand hover:text-white cursor-pointer"
      (click)="goToStudentsPage()"
    >
      Ver Estudiantes →
    </button>

  </div>

</section>
