<header class="app-header">

  <span class="app-header__brand">{{ brand() | uppercase }}</span>

  <nav class="app-header__nav">
    <!-- exact:true evita que '/' quede activo al navegar a rutas hijas como /students -->
    <a class="nav-link" routerLink="/"
      routerLinkActive="nav-link--active"
      [routerLinkActiveOptions]="{exact:true}">Inicio</a>

    <a class="nav-link" routerLink="/students"
      routerLinkActive="nav-link--active">Estudiantes</a>

    <a class="nav-link" routerLink="/layouts"
      routerLinkActive="nav-link--active">Layouts</a>
  </nav>

</header>
