<footer class="footer">

  <!-- UpperCasePipe: convierte el autor a mayusculas -->
  <p class="footer__author">{{ author() | uppercase }}</p>

  <!-- TitleCasePipe: primera letra de cada palabra en mayuscula -->
  <p class="footer__version">{{ version() | titlecase }}</p>

  <!-- SlicePipe: muestra solo los primeros 40 caracteres de la descripcion -->
  <p class="footer__desc">{{ description() | slice: 0 : 80 }}…</p>

  <!-- EmailPipe: enmascara el correo electronico del autor -->
  <p class="footer__email">Contacto: {{ email() | email }}</p>

  <!-- DatePipe: muestra la fecha actual con formato legible -->
  <p class="footer__date">{{ currentDate() | date: 'fullDate' }}</p>

</footer>
